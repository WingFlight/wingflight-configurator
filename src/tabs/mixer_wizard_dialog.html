<h3 i18n="mixerWizardTitle"></h3>
<div class="wizardBody">
<div class="content">

    <div class="wizardSection">
        <div class="wizardSectionTitle" i18n="mixerWizardLayoutTitle"></div>
        <label class="wizardOption">
            <input type="radio" name="wizardLayout" id="wizardLayoutConventional" value="conventional" checked />
            <span i18n="mixerWizardLayoutConventional"></span>
        </label>
        <label class="wizardOption">
            <input type="radio" name="wizardLayout" id="wizardLayoutFlyingWing" value="flyingWing" />
            <span i18n="mixerWizardLayoutFlyingWing"></span>
        </label>
    </div>

    <div class="wizardSection wizardAileronsSection">
        <div class="wizardSectionTitle" i18n="mixerWizardAileronsTitle"></div>
        <label class="wizardOption">
            <input type="radio" name="wizardAilerons" id="wizardAileronsNone" value="none" />
            <span i18n="mixerWizardAileronsNone"></span>
        </label>
        <label class="wizardOption">
            <input type="radio" name="wizardAilerons" id="wizardAileronsSingle" value="single" />
            <span i18n="mixerWizardAileronsSingle"></span>
        </label>
        <label class="wizardOption">
            <input type="radio" name="wizardAilerons" id="wizardAileronsIndependent" value="independent" checked />
            <span i18n="mixerWizardAileronsIndependent"></span>
        </label>
    </div>

    <div class="wizardSection wizardTailSection">
        <div class="wizardSectionTitle" i18n="mixerWizardTailTitle"></div>
        <label class="wizardOption">
            <input type="radio" name="wizardTail" id="wizardTailElevatorOnly" value="elevatorOnly" />
            <span i18n="mixerWizardTailElevatorOnly"></span>
        </label>
        <label class="wizardOption">
            <input type="radio" name="wizardTail" id="wizardTailElevatorRudder" value="elevatorRudder" checked />
            <span i18n="mixerWizardTailElevatorRudder"></span>
        </label>
        <label class="wizardOption">
            <input type="radio" name="wizardTail" id="wizardTailVTail" value="vtail" />
            <span i18n="mixerWizardTailVTail"></span>
        </label>
    </div>

    <div class="wizardSection wizardWingYawSection">
        <div class="wizardSectionTitle" i18n="mixerWizardWingYawTitle"></div>
        <label class="wizardOption">
            <input type="radio" name="wizardWingYaw" id="wizardWingYawNone" value="none" />
            <span i18n="mixerWizardWingYawNone"></span>
        </label>
        <label class="wizardOption">
            <input type="radio" name="wizardWingYaw" id="wizardWingYawRudder" value="rudder" checked />
            <span i18n="mixerWizardWingYawRudder"></span>
        </label>
    </div>

    <div class="wizardSection">
        <div class="wizardSectionTitle" i18n="mixerWizardFlapsTitle"></div>
        <label class="wizardOption">
            <input type="checkbox" id="wizardFlaps" />
            <span i18n="mixerWizardFlapsEnable"></span>
        </label>
    </div>

    <div class="wizardSection">
        <div class="wizardSectionTitle" i18n="mixerWizardMotorsTitle"></div>
        <label class="wizardOption">
            <input type="radio" name="wizardMotors" id="wizardMotors0" value="0" />
            <span i18n="mixerWizardMotors0"></span>
        </label>
        <label class="wizardOption">
            <input type="radio" name="wizardMotors" id="wizardMotors1" value="1" checked />
            <span i18n="mixerWizardMotors1"></span>
        </label>
        <label class="wizardOption">
            <input type="radio" name="wizardMotors" id="wizardMotors2" value="2" />
            <span i18n="mixerWizardMotors2"></span>
        </label>
    </div>

    <div class="wizardSection wizardDiffThrustSection">
        <label class="wizardOption">
            <input type="checkbox" id="wizardDiffThrust" />
            <span i18n="mixerWizardDiffThrust"></span>
        </label>
        <div class="wizardHint" i18n="mixerWizardDiffThrustHint"></div>
    </div>

    <div class="note">
        <p i18n="mixerWizardOverwriteWarning"></p>
    </div>

</div>
<div class="wizardPreview" id="wizardPreview">
    <div class="wizardPreviewLayers" id="wizardPreviewLayers"></div>
</div>
</div>
<div class="buttons">
    <a href="#" id="mixerWizardCancel" class="regular-button" i18n="mixerWizardCancel"></a>
    <a href="#" id="mixerWizardApply" class="regular-button" i18n="mixerWizardApply"></a>
</div>
