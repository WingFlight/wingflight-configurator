<div class="tab-mixer toolbar_fixed_bottom">
    <div class="content_wrapper">
        <div class="tab_title" i18n="tabMixer"></div>
        <div class="cf_doc_version_bt">
            <a id="button-documentation"></a>
        </div>

        <!-- CONFIGURATION -->
        <div class="configuration">
            <div class="grid-row margin-top">
                <div class="grid-col full-width">
                    <div class="gui_box grey mixerRulesBox">
                        <div class="gui_box_titlebar no-bottom-margin">
                            <div class="spacer_box_title" i18n="mixerRulesTitle"></div>
                        </div>
                        <div class="spacer_box">
                            <table class="mixerRuleTable">
                                <colgroup>
                                    <col class="mixerRuleColIndex">
                                    <col class="mixerRuleColOutput">
                                    <col class="mixerRuleColOperator">
                                    <col class="mixerRuleColInput">
                                    <col class="mixerRuleColCurve">
                                    <col class="mixerRuleColWeight">
                                    <col class="mixerRuleColWeight">
                                    <col class="mixerRuleColOffset">
                                    <col class="mixerRuleColSpeed">
                                    <col class="mixerRuleColReverse">
                                    <col class="mixerRuleColCondition">
                                    <col class="mixerRuleColActions">
                                    <col class="mixerRuleColHint">
                                </colgroup>
                                <thead>
                                    <tr>
                                        <th i18n="mixerRuleIndex"></th>
                                        <th i18n="mixerRuleOutput"></th>
                                        <th i18n="mixerRuleOperator"></th>
                                        <th i18n="mixerRuleInput"></th>
                                        <th i18n="mixerRuleCurve"></th>
                                        <th i18n="mixerRuleWeight"></th>
                                        <th i18n="mixerRuleWeightNeg"></th>
                                        <th i18n="mixerRuleOffset"></th>
                                        <th i18n="mixerRuleSpeed"></th>
                                        <th class="mixerRuleReverseHeader" i18n="mixerRuleReverse"></th>
                                        <th i18n="mixerRuleCondition"></th>
                                        <th i18n="mixerRuleActionsHeader"></th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="mixerRuleTableBody">
                                    <!-- rows generated by mixer.js -->
                                </tbody>
                            </table>
                            <div class="mixerRuleToolbar">
                                <a href="#" class="mixerAddRule regular-button" i18n="mixerAddRule"></a>
                                <a href="#" class="mixerOpenWizard regular-button" i18n="mixerOpenWizard"></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid-row margin-top">
            <div class="grid-col full-width">
                <div class="note mixerPassthroughCallout">
                    <p>Assign PASSTHROUGH mode to an AUX channel in the Modes tab to enable direct RC passthrough without stabilization.</p>
                </div>
            </div>
        </div>

        <!-- OVERRIDE -->
        <div class="override">
            <!--div class="grid-row margin-top">
                <div class="grid-col full-width">
                    <div class="note mixerOverrideNote">
                        <p i18n="mixerOverrideNote"></p>
                    </div>
                </div>
            </div-->

            <div class="gui_box">
                <div class="gui_box_titlebar no-bottom-margin">
                    <div class="spacer_box_title" i18n="mixerOverride"></div>
                    <div class="helpicon cf_tip" i18n_title="mixerOverrideHelp"></div>
                </div>
                <div class="spacer_box">
                    <table class="mixerOverrideSwitch">
                        <tr>
                            <td><input type="checkbox" id="mixerOverrideEnableSwitch" class="toggle" /></td>
                            <td><span i18n="mixerOverrideEnableSwitch"></span></td>
                            <td class="mixerPassthroughVisible"><input type="checkbox" id="mixerPassthroughEnableSwitch" class="toggle" /></td>
                            <td class="mixerPassthroughVisible"><span i18n="mixerPassthroughEnableSwitch"></span></td>
                            <td><span class="description" i18n="mixerOverrideEnableSwitchText"></span></td>
                        </tr>
                    </table>
                </div>
                <div class="mixerOverrideAxis">
                    <table class="mixerOverrideTable">
                        <thead>
                            <tr class="trhead">
                                <th i18n="mixerInputName"></th>
                                <th i18n="mixerOverrideEnable"></th>
                                <th class="mixerPassthroughVisible" i18n="mixerPassthroughEnable"></th>
                                <th i18n="mixerOverrideValue"></th>
                                <th i18n="mixerOverrideSlider"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- ROWS GENERATED HERE -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <div class="content_toolbar">
        <div class="btn revert_btn">
            <a class="revert" href="#" i18n="buttonRevert"></a>
        </div>
        <div class="btn save_btn">
            <a class="save" href="#" i18n="buttonSave"></a>
        </div>
        <div class="btn reboot_btn">
            <a class="reboot" href="#" i18n="buttonSaveReboot"></a>
        </div>
    </div>

    <dialog class="dialogMixerReset">
        <h3 i18n="dialogMixerResetTitle"></h3>
        <div class="content">
            <div i18n="dialogMixerResetNote" style="margin-top: 10px"></div>
        </div>
        <div class="buttons">
            <a href="#" class="dialogMixerReset-acceptbtn regular-button" i18n="dialogMixerResetAccept"></a>
            <a href="#" class="dialogMixerReset-revertbtn regular-button" i18n="dialogMixerResetRevert"></a>
        </div>
    </dialog>

    <dialog id="mixerWizardDialog"></dialog>

</div>

<div id="tab-mixer-templates">

    <table class="mixerRuleTemplate">
        <tbody>
            <tr class="mixerRule">
                <td><span class="ruleIndex"></span></td>
                <td>
                    <select class="ruleOutput">
                        <!-- LIST GENERATED HERE -->
                    </select>
                </td>
                <td>
                    <select class="ruleOper">
                        <!-- LIST GENERATED HERE -->
                    </select>
                </td>
                <td>
                    <select class="ruleInput">
                        <!-- LIST GENERATED HERE -->
                    </select>
                </td>
                <td>
                    <select class="ruleCurve">
                        <!-- LIST GENERATED HERE -->
                    </select>
                </td>
                <td>
                    <input class="ruleWeight" type="number" min="-5000" max="5000" step="10" />
                </td>
                <td>
                    <input class="ruleWeightNeg" type="number" min="-5000" max="5000" step="10" />
                </td>
                <td>
                    <input class="ruleOffset" type="number" min="-1000" max="1000" step="10" />
                </td>
                <td>
                    <input class="ruleSpeed" type="number" min="0" max="60000" step="100" />
                </td>
                <td class="mixerRuleReverseCell">
                    <input class="ruleReverse" type="checkbox" />
                </td>
                <td>
                    <select class="ruleCondition">
                        <!-- LIST GENERATED HERE -->
                    </select>
                </td>
                <td class="mixerRuleActions">
                    <a href="#" class="ruleMoveUp" i18n_title="mixerRuleMoveUp">&#9650;</a>
                    <a href="#" class="ruleMoveDown" i18n_title="mixerRuleMoveDown">&#9660;</a>
                    <a href="#" class="ruleDelete" i18n_title="mixerRuleDelete">&#10005;</a>
                </td>
                <td class="mixerRuleHint"><span class="ruleHint"></span></td>
            </tr>
        </tbody>
    </table>

    <table class="mixerOverrideTemplate">
        <tbody>
            <tr>
                <td><span class="mixerOverrideName"></span></td>
                <td>
                    <div class="mixerOverrideEnable">
                        <input type="checkbox" class="toggle"/>
                    </div>
                </td>
                <td class="mixerPassthroughVisible">
                    <div class="mixerPassthroughEnable">
                        <input type="checkbox" class="toggle"/>
                    </div>
                </td>
                <td>
                    <div class="mixerOverrideInput">
                        <input type="number" value="0"/>
                    </div>
                </td>
                <td>
                    <div class="mixerOverrideSliderLeftLabel"></div>
                    <div class="mixerOverrideSliderRightLabel"></div>
                    <div class="mixerOverrideSlider pips-range"></div>
                </td>
            </tr>
        </tbody>
    </table>

</div>
