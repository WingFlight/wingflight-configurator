<div class="tab-curves toolbar_fixed_bottom">
    <div class="content_wrapper">
        <div class="tab_title" i18n="tabCurves"></div>
        <div class="cf_doc_version_bt">
            <a id="button-documentation"></a>
        </div>

        <div class="grid-row margin-top">
            <div class="grid-col full-width">
                <div class="gui_box grey curvesBox">
                    <div class="gui_box_titlebar no-bottom-margin">
                        <div class="spacer_box_title" i18n="curvesTitle"></div>
                    </div>
                    <div class="spacer_box">
                        <div class="curveToolbar">
                            <select id="curveSelect">
                                <!-- LIST GENERATED HERE -->
                            </select>
                            <a href="#" class="curveResetBtn regular-button" i18n="curveReset"></a>
                        </div>
                        <div class="curveHint" i18n="curveEditorHint"></div>
                        <div class="curveEditorRow">
                            <div class="curvePlotWrapper">
                                <svg id="curveSvg" class="curveSvg" viewBox="0 0 400 400"></svg>
                            </div>
                            <div class="curvePointListWrapper">
                                <table class="curvePointTable">
                                    <thead>
                                        <tr>
                                            <th i18n="curvePointIndex"></th>
                                            <th i18n="curvePointX"></th>
                                            <th i18n="curvePointY"></th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody id="curvePointTableBody">
                                        <!-- rows generated by curves.js -->
                                    </tbody>
                                </table>
                                <div class="curvePointListToolbar">
                                    <a href="#" class="curveAddPointBtn regular-button" i18n="curveAddPoint"></a>
                                    <span class="curvePointCountGroup">
                                        <span class="curvePointCountLabel" i18n="curvePointCount"></span>
                                        <select id="curvePointCountSelect">
                                            <!-- LIST GENERATED HERE -->
                                        </select>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="content_toolbar">
        <div class="btn revert_btn">
            <a class="revert" href="#" i18n="buttonRevert"></a>
        </div>
        <div class="btn save_btn">
            <a class="save" href="#" i18n="buttonSave"></a>
        </div>
    </div>
</div>
