<div class="tab-profiles toolbar_fixed_bottom">
    <div class="content_wrapper">
        <div class="tab_title" i18n="tabProfiles"></div>
        <div class="cf_doc_version_bt">
            <a id="button-documentation"></a>
        </div>
        <div class="content_wrapper_header">
            <div class="content_wrapper_header_btns">
                <div class="default_btn copybtn">
                    <a href="#" id="copyProfile" i18n="profilesCopyProfile"></a>
                </div>
                <div class="default_btn resetbtn">
                    <a href="#" id="resetProfile" i18n="profilesResetProfile"></a>
                </div>
            </div>
        </div>

        <div class="tab-container">
            <div class="tab profile1 active">
                <a href="#" i18n="profilesSubTab1"></a>
            </div>
            <div class="tab profile2">
                <a href="#" i18n="profilesSubTab2"></a>
            </div>
            <div class="tab profile3">
                <a href="#" i18n="profilesSubTab3"></a>
            </div>
            <div class="tab profile4">
                <a href="#" i18n="profilesSubTab4"></a>
            </div>
            <div class="tab profile5">
                <a href="#" i18n="profilesSubTab5"></a>
            </div>
            <div class="tab profile6">
                <a href="#" i18n="profilesSubTab6"></a>
            </div>
        </div>
        <div class="tab-area">
        <form name="profile" id="profile">
            <div class="subtab">
                <div class="clear-both"></div>
                <div class="cf_column">
                    <div class="note profilesPIDWarning">
                        <p class="profilesPIDWarningText"></p>
                    </div>
                    <div class="gui_box grey pid_config">
                        <div class="gui_box_titlebar">
                            <div class="spacer_box_title" i18n="profilesPidGains"></div>
                        </div>
                        <table id="pid_main" class="pid_table">
                            <tr class="pid_titlebar">
                                <th class="name">
                                    <div class="name-helpicon-flex">
                                        <div i18n="profilesPIDGains" class="sm-min"></div>
                                    </div>
                                </th>
                                <th class="proportional">
                                    <div class="name-helpicon-flex">
                                        <div i18n="profilesProportional" class="sm-min"></div>
                                        <div class="xs">P</div>
                                        <div class="helpicon cf_tip" i18n_title="profilesProportionalHelp"></div>
                                    </div>
                                </th>
                                <th class="integral">
                                    <div class="name-helpicon-flex">
                                        <div i18n="profilesIntegral" class="sm-min"></div>
                                        <div class="xs">I</div>
                                        <div class="helpicon cf_tip" i18n_title="profilesIntegralHelp"></div>
                                    </div>
                                </th>
                                <th class="derivative">
                                    <div class="name-helpicon-flex">
                                        <div i18n="profilesDerivative" class="sm-min"></div>
                                        <div class="xs">D</div>
                                        <div class="helpicon cf_tip" i18n_title="profilesDerivativeHelp"></div>
                                    </div>
                                </th>
                                <th class="feedforward">
                                    <div class="name-helpicon-flex">
                                        <div i18n="profilesFeedforward" class="sm-min"></div>
                                        <div class="xs">FF</div>
                                        <div class="helpicon cf_tip" i18n_title="profilesFeedforwardHelp"></div>
                                    </div>
                                </th>
                                <th class="boost">
                                    <div class="name-helpicon-flex">
                                        <div i18n="profilesBoost" class="sm-min"></div>
                                        <div class="xs">B</div>
                                        <div class="helpicon cf_tip" i18n_title="profilesBoostHelp"></div>
                                    </div>
                                </th>
                            </tr>
                            <tr class="ROLL"><!-- 0 -->
                                <td class="axis_title" i18n="axisROLL">ROLL</td>
                                <td class="pid_data"><input type="number" name="P" step="1" min="0" max="1000" /></td>
                                <td class="pid_data"><input type="number" name="I" step="1" min="0" max="1000" /></td>
                                <td class="pid_data"><input type="number" name="D" step="1" min="0" max="1000" /></td>
                                <td class="pid_data"><input type="number" name="F" step="1" min="0" max="1000" /></td>
                                <td class="pid_data"><input type="number" name="B" step="1" min="0" max="1000" /></td>
                            </tr>
                            <tr class="PITCH"><!-- 1 -->
                                <td class="axis_title" i18n="axisPITCH">PITCH</td>
                                <td class="pid_data"><input type="number" name="P" step="1" min="0" max="1000" /></td>
                                <td class="pid_data"><input type="number" name="I" step="1" min="0" max="1000" /></td>
                                <td class="pid_data"><input type="number" name="D" step="1" min="0" max="1000" /></td>
                                <td class="pid_data"><input type="number" name="F" step="1" min="0" max="1000" /></td>
                                <td class="pid_data"><input type="number" name="B" step="1" min="0" max="1000" /></td>
                            </tr>
                            <tr class="YAW"><!-- 2 -->
                                <td class="axis_title" i18n="axisYAW">YAW</td>
                                <td class="pid_data"><input type="number" name="P" step="1" min="0" max="1000" /></td>
                                <td class="pid_data"><input type="number" name="I" step="1" min="0" max="1000" /></td>
                                <td class="pid_data"><input type="number" name="D" step="1" min="0" max="1000" /></td>
                                <td class="pid_data"><input type="number" name="F" step="1" min="0" max="1000" /></td>
                                <td class="pid_data"><input type="number" name="B" step="1" min="0" max="1000" /></td>
                            </tr>
                        </table>
                    </div>

                    <div class="gui_box grey pid_config">
                        <div class="gui_box_titlebar">
                            <div class="spacer_box_title" i18n="profilesPidSettings"></div>
                        </div>
                        <table id="pid_advanced" class="settings_table">
                            <tr class="errorRotation border">
                                <td>
                                    <input type="checkbox" id="errorRotation" class="toggle" />
                                </td>
                                <td colspan="2">
                                    <span i18n="profilesErrorRotation"></span>
                                    <div class="helpicon cf_tip" i18n_title="profilesErrorRotationHelp"></div>
                                </td>
                            </tr>
                            <tr class="itermDecay">
                                <td>
                                    <input type="number" id="itermDecayTime" step="0.1" min="0" max="25" />
                                </td>
                                <td colspan="2">
                                    <label for="itermDecayTime">
                                        <span i18n="profilesItermDecayTime"></span>
                                    </label>
                                    <div class="helpicon cf_tip" i18n_title="profilesItermDecayTimeHelp"></div>
                                </td>
                            </tr>
                            <tr class="itermDecay border">
                                <td>
                                    <input type="number" id="itermDecayLimit" step="1" min="0" max="250" />
                                </td>
                                <td colspan="2">
                                    <label for="itermDecayLimit">
                                        <span i18n="profilesItermDecayLimit"></span>
                                    </label>
                                    <div class="helpicon cf_tip" i18n_title="profilesItermDecayLimitHelp"></div>
                                </td>
                            </tr>
                            <tr class="fwTpa">
                                <td>
                                    <input type="number" id="fwTpaBreakpoint" step="1" min="0" max="100" />
                                </td>
                                <td colspan="2">
                                    <label for="fwTpaBreakpoint">
                                        <span i18n="profilesFwTpaBreakpoint"></span>
                                    </label>
                                    <div class="helpicon cf_tip" i18n_title="profilesFwTpaBreakpointHelp"></div>
                                </td>
                            </tr>
                            <tr class="fwTpa border">
                                <td>
                                    <input type="number" id="fwTpaRate" step="1" min="0" max="100" />
                                </td>
                                <td colspan="2">
                                    <label for="fwTpaRate">
                                        <span i18n="profilesFwTpaRate"></span>
                                    </label>
                                    <div class="helpicon cf_tip" i18n_title="profilesFwTpaRateHelp"></div>
                                </td>
                            </tr>
                            <tr class="itermRelax border">
                                <td>
                                    <input type="checkbox" id="itermRelax" class="toggle" />
                                </td>
                                <td colspan="2">
                                    <div class="helpicon cf_tip" i18n_title="profilesItermRelaxHelp"></div>
                                    <div>
                                        <label for="itermRelax">
                                            <span i18n="profilesItermRelax"></span>
                                        </label>
                                    </div>
                                    <div class="helpicon cf_tip subhelp" i18n_title="profilesItermRelaxTypeHelp"></div>
                                    <span class="suboption">
                                        <select id="itermRelaxType">
                                            <option i18n="profilesItermRelaxTypeOptionRP" value="1"/>
                                            <option i18n="profilesItermRelaxTypeOptionRPY" value="2"/>
                                        </select>
                                        <label for="itermRelaxType">
                                            <span i18n="profilesItermRelaxType"></span>
                                        </label>
                                    </span>
                                    <div class="helpicon cf_tip subhelp" i18n_title="profilesItermRelaxCutoffHelp"></div>
                                    <span class="suboption">
                                        <input type="number" id="itermRelaxCutoffRoll" step="1" min="1" max="100" />
                                        <label for="itermRelaxCutoffRoll">
                                            <span i18n="profilesItermRelaxCutoffRoll"></span>
                                        </label>
                                    </span>
                                    <span class="suboption">
                                        <input type="number" id="itermRelaxCutoffPitch" step="1" min="1" max="100" />
                                        <label for="itermRelaxCutoffPitch">
                                            <span i18n="profilesItermRelaxCutoffPitch"></span>
                                        </label>
                                    </span>
                                    <span class="suboption itermRelaxYawOption">
                                        <input type="number" id="itermRelaxCutoffYaw" step="1" min="1" max="100" />
                                        <label for="itermRelaxCutoffYaw">
                                            <span i18n="profilesItermRelaxCutoffYaw"></span>
                                        </label>
                                    </span>
                                </td>
                            </tr>
                            <tr class="errorLimit">
                                <td>
                                    <input type="number" id="errorLimitRoll" step="1" min="0" max="180" />
                                </td>
                                <td colspan="2">
                                    <label for="errorLimitRoll">
                                        <span i18n="profilesErrorLimitRoll"></span>
                                    </label>
                                    <div class="helpicon cf_tip" i18n_title="profilesErrorLimitHelp"></div>
                                </td>
                            </tr>
                            <tr class="errorLimit">
                                <td>
                                    <input type="number" id="errorLimitPitch" step="1" min="0" max="180" />
                                </td>
                                <td colspan="2">
                                    <label for="errorLimitPitch">
                                        <span i18n="profilesErrorLimitPitch"></span>
                                    </label>
                                </td>
                            </tr>
                            <tr class="errorLimit border">
                                <td>
                                    <input type="number" id="errorLimitYaw" step="1" min="0" max="180" />
                                </td>
                                <td colspan="2">
                                    <label for="errorLimitYaw">
                                        <span i18n="profilesErrorLimitYaw"></span>
                                    </label>
                                </td>
                            </tr>
                        </table>
                    </div>

                </div>

                <div class="cf_column">

                    <div class="gui_box grey spacer_left pid_config">
                        <div class="gui_box_titlebar">
                            <div class="spacer_box_title" i18n="profilesPidBandwidth"></div>
                        </div>
                        <table id="pid_bandwidth" class="settings_table pid_settings">
                            <tr class="gyroCutoff">
                                <td>
                                    <input type="number" id="gyroCutoffRoll" step="1" min="0" max="250" />
                                </td>
                                <td colspan="2">
                                    <label for="gyroCutoffRoll">
                                        <span i18n="profilesGyroCutoffRoll"></span>
                                    </label>
                                    <div class="helpicon cf_tip" i18n_title="profilesGyroCutoffHelp"></div>
                                </td>
                            </tr>
                            <tr class="gyroCutoff">
                                <td>
                                    <input type="number" id="gyroCutoffPitch" step="1" min="0" max="250" />
                                </td>
                                <td colspan="2">
                                    <label for="gyroCutoffPitch">
                                        <span i18n="profilesGyroCutoffPitch"></span>
                                    </label>
                                </td>
                            </tr>
                            <tr class="gyroCutoff border">
                                <td>
                                    <input type="number" id="gyroCutoffYaw" step="1" min="0" max="250" />
                                </td>
                                <td colspan="2">
                                    <label for="gyroCutoffYaw">
                                        <span i18n="profilesGyroCutoffYaw"></span>
                                    </label>
                                </td>
                            </tr>
                            <tr class="dtermCutoff">
                                <td>
                                    <input type="number" id="dtermCutoffRoll" step="1" min="0" max="250" />
                                </td>
                                <td colspan="2">
                                    <label for="dtermCutoffRoll">
                                        <span i18n="profilesDtermCutoffRoll"></span>
                                    </label>
                                    <div class="helpicon cf_tip" i18n_title="profilesDtermCutoffHelp"></div>
                                </td>
                            </tr>
                            <tr class="dtermCutoff">
                                <td>
                                    <input type="number" id="dtermCutoffPitch" step="1" min="0" max="250" />
                                </td>
                                <td colspan="2">
                                    <label for="dtermCutoffPitch">
                                        <span i18n="profilesDtermCutoffPitch"></span>
                                    </label>
                                </td>
                            </tr>
                            <tr class="dtermCutoff border">
                                <td>
                                    <input type="number" id="dtermCutoffYaw" step="1" min="0" max="250" />
                                </td>
                                <td colspan="2">
                                    <label for="dtermCutoffYaw">
                                        <span i18n="profilesDtermCutoffYaw"></span>
                                    </label>
                                </td>
                            </tr>
                            <tr class="btermCutoff">
                                <td>
                                    <input type="number" id="btermCutoffRoll" step="1" min="0" max="250" />
                                </td>
                                <td colspan="2">
                                    <label for="btermCutoffRoll">
                                        <span i18n="profilesBtermCutoffRoll"></span>
                                    </label>
                                    <div class="helpicon cf_tip" i18n_title="profilesBtermCutoffHelp"></div>
                                </td>
                            </tr>
                            <tr class="btermCutoff">
                                <td>
                                    <input type="number" id="btermCutoffPitch" step="1" min="0" max="250" />
                                </td>
                                <td colspan="2">
                                    <label for="btermCutoffPitch">
                                        <span i18n="profilesBtermCutoffPitch"></span>
                                    </label>
                                </td>
                            </tr>
                            <tr class="btermCutoff border">
                                <td>
                                    <input type="number" id="btermCutoffYaw" step="1" min="0" max="250" />
                                </td>
                                <td colspan="2">
                                    <label for="btermCutoffYaw">
                                        <span i18n="profilesBtermCutoffYaw"></span>
                                    </label>
                                </td>
                            </tr>
                        </table>
                    </div>

                    <div class="gui_box grey spacer_left">
                        <div class="gui_box_titlebar">
                            <div class="spacer_box_title" i18n="profilesLevelingSettings"></div>
                        </div>
                        <table class="settings_table">
                            <tr class="acroTrainerGain">
                                <td>
                                    <input type="number" id="acroTrainerGain" step="1" min="25" max="255"/>
                                </td>
                                <td colspan="2">
                                    <span i18n="profilesAcroTrainerGain"></span>
                                    <div class="helpicon cf_tip" i18n_title="profilesAcroTrainerGainHelp"></div>
                                </td>
                            </tr>
                            <tr class="acroTrainerLimit">
                                <td>
                                    <input type="number" id="acroTrainerLimit" step="1" min="10" max="80"/>
                                </td>
                                <td colspan="2">
                                    <span i18n="profilesAcroTrainerLimit"></span>
                                    <div class="helpicon cf_tip" i18n_title="profilesAcroTrainerLimitHelp"></div>
                                </td>
                            </tr>
                            <tr class="angleModeGain">
                                <td>
                                    <input type="number" id="angleModeGain" step="1" min="0" max="200"/>
                                </td>
                                <td colspan="2">
                                    <span i18n="profilesAngleModeGain"></span>
                                    <div class="helpicon cf_tip" i18n_title="profilesAngleModeGainHelp"></div>
                                </td>
                            </tr>
                            <tr class="angleModeLimit">
                                <td>
                                    <input type="number" id="angleModeLimit" step="1" min="10" max="90"/>
                                </td>
                                <td colspan="2">
                                    <span i18n="profilesAngleModeLimit"></span>
                                    <div class="helpicon cf_tip" i18n_title="profilesAngleModeLimitHelp"></div>
                                </td>
                            </tr>
                            <tr class="horizonModeGain">
                                <td>
                                    <input type="number" id="horizonModeGain" step="1" min="0" max="200"/>
                                </td>
                                <td colspan="2">
                                    <span i18n="profilesHorizonModeGain"></span>
                                    <div class="helpicon cf_tip" i18n_title="profilesHorizonModeGainHelp"></div>
                                </td>
                            </tr>
                        </table>
                    </div>

                </div>
            </div>
        </form>
        </div>
        <div class="clear-both"></div>
    </div>

    <div class="content_toolbar">
        <div class="btn revert_btn">
            <a class="revert" href="#" i18n="buttonRevert"></a>
        </div>
        <div class="btn save_btn">
            <a class="save" href="#" i18n="buttonSave"></a>
        </div>
    </div>

    <dialog class="dialogCopyProfile">
        <h3 i18n="dialogCopyProfileTitle"></h3>
        <div class="content">
            <div i18n="dialogCopyProfileNote" style="margin-top: 10px"></div>
            <div class="contentProfile" style="margin-top:20px;">
                <div>
                    <span i18n="dialogCopyProfileText"></span>
                    <select class="selectProfile"></select>
                </div>
            </div>
        </div>
        <div class="buttons">
            <a href="#" class="dialogCopyProfile-confirmbtn regular-button" i18n="dialogCopyProfileConfirm"></a>
            <a href="#" class="dialogCopyProfile-cancelbtn regular-button" i18n="dialogCopyProfileClose"></a>
        </div>
    </dialog>

    <dialog class="dialogResetProfile">
        <h3 i18n="dialogResetProfileTitle"></h3>
        <div class="content">
            <div i18n="dialogResetProfileNote" style="margin-top: 10px"></div>
        </div>
        <div class="buttons">
            <a href="#" class="dialogResetProfile-confirmbtn regular-button" i18n="dialogResetProfileConfirm"></a>
            <a href="#" class="dialogResetProfile-cancelbtn regular-button" i18n="dialogResetProfileClose"></a>
        </div>
    </dialog>

    <dialog class="dialogProfileChange">
        <h3 i18n="dialogProfileChangeTitle"></h3>
        <div class="content">
            <div i18n="dialogProfileChangeNote"></div>
        </div>
        <div class="buttons">
            <a href="#" class="dialogProfileChangeConfirmBtn regular-button" i18n="dialogProfileChangeConfirm"></a>
        </div>
    </dialog>

</div>
