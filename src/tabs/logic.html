<div class="tab-logic toolbar_fixed_bottom">
    <div class="content_wrapper">
        <div class="tab_title" i18n="tabLogic"></div>
        <div class="cf_doc_version_bt">
            <a id="button-documentation"></a>
        </div>
        <div class="note">
            <p i18n="logicNote"></p>
        </div>
        <div class="grid-row margin-top">
            <div class="grid-col full-width">
                <div class="gui_box grey logicConditionsBox">
                    <div class="gui_box_titlebar no-bottom-margin">
                        <div class="spacer_box_title" i18n="logicConditionsTitle"></div>
                    </div>
                    <div class="spacer_box">
                        <table class="logicConditionTable">
                            <colgroup>
                                <col class="logicColIndex">
                                <col class="logicColEnable">
                                <col class="logicColOperator">
                                <col class="logicColOperandType">
                                <col class="logicColOperandValue">
                                <col class="logicColOperandType">
                                <col class="logicColOperandValue">
                                <col class="logicColStatus">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th i18n="logicIndex"></th>
                                    <th i18n="logicEnable"></th>
                                    <th i18n="logicOperator"></th>
                                    <th colspan="2" i18n="logicOperandA"></th>
                                    <th colspan="2" i18n="logicOperandB"></th>
                                    <th i18n="logicStatus"></th>
                                </tr>
                            </thead>
                            <tbody id="logicConditionTableBody">
                                <!-- rows generated by logic.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="content_toolbar">
        <div class="btn revert_btn">
            <a class="revert" href="#" i18n="buttonRevert"></a>
        </div>
        <div class="btn save_btn">
            <a class="save" href="#" i18n="buttonSave"></a>
        </div>
    </div>
</div>

<div id="tab-logic-templates">

    <table class="logicConditionTemplate">
        <tbody>
            <tr class="logicCondition">
                <td><span class="condIndex"></span></td>
                <td>
                    <input class="condEnable" type="checkbox" />
                </td>
                <td>
                    <select class="condOperator">
                        <!-- LIST GENERATED HERE -->
                    </select>
                </td>
                <td>
                    <select class="condOperandAType">
                        <!-- LIST GENERATED HERE -->
                    </select>
                </td>
                <td>
                    <span class="condOperandAValueNumberGroup">
                        <input class="condOperandAValueNumber" type="number" min="-32000" max="32000" step="1" />
                        <a href="#" class="condOperandASetValue regular-button" i18n="logicSetValue" i18n_title="logicSetValueHelp"></a>
                    </span>
                    <span class="condOperandAValueChannelGroup">
                        <select class="condOperandAValueChannel"><!-- LIST GENERATED HERE --></select>
                        <span class="condOperandALiveValue"></span>
                    </span>
                    <select class="condOperandAValueMode"><!-- LIST GENERATED HERE --></select>
                    <select class="condOperandAValueCondition"><!-- LIST GENERATED HERE --></select>
                </td>
                <td>
                    <select class="condOperandBType">
                        <!-- LIST GENERATED HERE -->
                    </select>
                </td>
                <td>
                    <span class="condOperandBValueNumberGroup">
                        <input class="condOperandBValueNumber" type="number" min="-32000" max="32000" step="1" />
                        <a href="#" class="condOperandBSetValue regular-button" i18n="logicSetValue" i18n_title="logicSetValueHelp"></a>
                    </span>
                    <span class="condOperandBValueChannelGroup">
                        <select class="condOperandBValueChannel"><!-- LIST GENERATED HERE --></select>
                        <span class="condOperandBLiveValue"></span>
                    </span>
                    <select class="condOperandBValueMode"><!-- LIST GENERATED HERE --></select>
                    <select class="condOperandBValueCondition"><!-- LIST GENERATED HERE --></select>
                </td>
                <td class="logicStatusCell">
                    <span class="condStatus"></span>
                </td>
            </tr>
        </tbody>
    </table>

</div>
